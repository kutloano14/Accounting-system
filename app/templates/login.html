<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Accounting MVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/app.css?v=15" />
</head>
<body>
  <div class="bg-shape one"></div>
  <div class="bg-shape two"></div>

  <div class="auth-container">
    <div class="auth-card">
      <h1>Login</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <p class="auth-link">Don't have an account? <a href="/register">Register here</a></p>
    </div>
  </div>

  <script>
    async function getCurrentUser() {
      try {
        const res = await fetch('/auth/me', { credentials: 'same-origin' });
        if (!res.ok) return null;
        return await res.json();
      } catch (error) {
        return null;
      }
    }

    getCurrentUser().then((user) => {
      if (user) {
        window.location.href = '/';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = {
        email: formData.get('email'),
        password: formData.get('password')
      };

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          window.location.href = '/';
        } else {
          const error = await response.json();
          alert(error.detail || 'Login failed');
        }
      } catch (error) {
        alert('An error occurred. Please try again.');
      }
    });
  </script>
</body>
</html>
